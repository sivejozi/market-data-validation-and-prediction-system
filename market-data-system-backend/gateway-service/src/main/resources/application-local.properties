server.port=8082
spring.application.name=gateway-service

jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

logging.file.path=logs
logging.file.name=./logs/server.log

eureka.client.enabled=true
eureka.client.serviceUrl.defaultZone=http://localhost:8061/eureka/

services.validation.url=http://localhost:8080
services.user.url=http://localhost:8081

spring.main.web-application-type=reactive
spring.cloud.gateway.server.webflux.enabled=true

# Routes
spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=validation-prediction-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8080
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/market-rates/**

spring.cloud.gateway.server.webflux.routes[2].id=validation-service-apidocs
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8080
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/validation/v3/api-docs
spring.cloud.gateway.server.webflux.routes[2].filters[0]=RewritePath=/validation/v3/api-docs, /v3/api-docs

spring.cloud.gateway.server.webflux.routes[3].id=user-service-apidocs
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/user/v3/api-docs
spring.cloud.gateway.server.webflux.routes[3].filters[0]=RewritePath=/user/v3/api-docs, /v3/api-docs

spring.cloud.gateway.server.webflux.routes[4].id=alerting-service-apidocs
spring.cloud.gateway.server.webflux.routes[4].uri=http://localhost:8083
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/alerts/v3/api-docs
spring.cloud.gateway.server.webflux.routes[4].filters[0]=RewritePath=/alerts/v3/api-docs, /v3/api-docs

spring.cloud.gateway.server.webflux.routes[5].id=alerting-service
spring.cloud.gateway.server.webflux.routes[5].uri=http://localhost:8083
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/alerts/**


# Swagger
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.urls[0].name=Validation Predicting Service
springdoc.swagger-ui.urls[0].url=/validation/v3/api-docs
springdoc.swagger-ui.urls[1].name=User Service
springdoc.swagger-ui.urls[1].url=/user/v3/api-docs
springdoc.swagger-ui.urls[2].name=Alerting Service
springdoc.swagger-ui.urls[2].url=/alerts/v3/api-docs

logging.level.org.springdoc=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG