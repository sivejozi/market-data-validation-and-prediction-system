name: UI — Build and Push

on:
  push:
    branches: ["main"]
    paths:
      - "market-data-system-ui/**"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: 🐳 Build and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./market-data-system-ui
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/sivejozi/market-data-system-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    name: 📝 Update GitOps
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: sivejozi/market-data-system-gitops
          token: ${{ secrets.GHCR_PAT }}

      - name: Update image tag
        run: |
          sed -i "s|ghcr.io/sivejozi/market-data-system-ui:.*|ghcr.io/sivejozi/market-data-system-ui:${{ github.sha }}|g" \
            market-data-system-ui/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add market-data-system-ui/deployment.yaml
          git commit -m "chore: update ui image to ${{ github.sha }}"
          git push