name: Discovery Service — Build and Push

on:
  push:
    branches: ["main"]
    paths:
      - "market-data-system-backend/discovery-service/**"

permissions:
  contents: read
  packages: write

jobs:
  build-jar:
    name: ☕ Build JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: |
          cd market-data-system-backend/discovery-service
          mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: discovery-service-jar
          path: market-data-system-backend/discovery-service/target/*.jar

  build-and-push:
    name: 🐳 Build and Push Image
    runs-on: ubuntu-latest
    needs: build-jar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: discovery-service-jar
          path: market-data-system-backend/discovery-service/target

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./market-data-system-backend/discovery-service
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/sivejozi/discovery-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    name: 📝 Update GitOps
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: sivejozi/market-data-system-gitops
          token: ${{ secrets.GHCR_PAT }}

      - name: Update Image Tag
        run: |
          sed -i "s|ghcr.io/sivejozi/discovery-service:.*|ghcr.io/sivejozi/discovery-service:${{ github.sha }}|g" \
            discovery-service/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add discovery-service/deployment.yaml
          git commit -m "chore: update discovery-service image to ${{ github.sha }}"
          git push