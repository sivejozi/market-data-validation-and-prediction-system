name: UI Docker Build And Push

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up QEMU for multi-platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Build and push Docker image for both amd64 and arm64
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./market-data-system-ui
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/sivejozi/market-data-system-ui:latest
            ghcr.io/sivejozi/market-data-system-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max