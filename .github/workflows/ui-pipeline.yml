name: UI Docker Build And Push

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry using GITHUB_TOKEN
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Build and push Docker image with both latest and commit SHA tags
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./market-data-system-ui
          push: true
          tags: |
            ghcr.io/sivejozi/market-data-system-ui:latest
            ghcr.io/sivejozi/market-data-system-ui:${{ github.sha }}
          platforms: linux/amd64